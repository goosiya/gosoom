# gosoom CI — PR/메인 push마다 api(pytest+ruff) + JS(lint/typecheck/build+vitest) 게이트 (AC1, AR20)
# 어느 잡이든 실패하면 워크플로우 적색. 배포(Railway)는 GitHub 연동으로 별도 처리(이 워크플로우 밖).
name: CI

on:
  pull_request: {}
  push:
    branches: [main]

# 같은 ref에서 중복 실행 취소(이전 실행 중단) — 자원 절약
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── api 잡: 실 Postgres 통합 테스트(conftest db_session/client_db) ──────────────
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    # config.py가 database_url·jwt_secret을 필수로 요구 → import app.main(테스트 수집·alembic)
    # 시점에 둘 다 필요(둘 중 하나라도 없으면 ValidationError로 크래시). 잡 레벨 env로 주입.
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gosoom_test
      JWT_SECRET: ci-test-secret-not-for-prod
    services:
      # Supabase PG17 정합 — 실 DB 제약(이메일 unique 등)을 CI에서 그대로 검증
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gosoom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # python-preference="only-system"(pyproject)이라 uv가 standalone Python을 받지 않음
      # → setup-python으로 시스템 3.12를 먼저 공급해야 uv sync가 그 인터프리터를 잡는다.
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # setup-uv는 2026-03 v8.0.0부터 불변 릴리스 정책 — moving tag(@v8 등) 미발행,
      # full-version 태그만 resolve된다. 현행 안정판 v8.1.0으로 정확 핀(첫 push 실패 방지).
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      # dev 그룹(pytest/pytest-asyncio/httpx/ruff) 포함 설치. uv.lock 고정(--frozen)으로 재현.
      - name: Install dependencies
        run: uv sync --frozen

      # 통합 테스트가 실 DB·실 제약을 사용 → 테스트 전에 스키마 생성 필수.
      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest, real Postgres)
        run: uv run pytest

  # ── JS 잡: turbo 워크스페이스 전역 게이트 + api-client 단위 테스트 ─────────────
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm을 setup-node보다 먼저 설치해야 cache: pnpm이 PATH에서 pnpm을 찾는다(순서 의존).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 락파일 고정 설치(드리프트 시 실패). esbuild 등 네이티브 빌드는
      # pnpm-workspace.yaml onlyBuiltDependencies/allowBuilds로 승인됨(1.7) → 재현됨.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # NEXT_PUBLIC_API_URL 미설정 시 resolveBaseUrl() 폴백으로 빌드 성공(검증 목적엔 충분).
      # 생성물(packages/api-client/src/generated)은 커밋되어 있어 orval 재생성 불요.
      - name: Build
        run: pnpm build

      # 인증 인터셉터/토큰스토어 단위 테스트(Vitest) — turbo에 test 태스크가 없어 --filter로 직접 호출.
      - name: api-client unit tests (Vitest)
        run: pnpm --filter @gosoom/api-client test
